<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tesseract - 12A Kỷ Niệm</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* CSS GỘP TRỰC TIẾP VÀO ĐÂY */
        :root { --primary: #00d2ff; --accent: #3a7bd5; }
        body {
            margin: 0; padding: 0; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
            font-family: 'Quicksand', sans-serif; color: white;
        }
        /* Hiệu ứng sao bay (Tự tạo bằng code, không cần ảnh ngoài) */
        #stars, #stars2, #stars3 { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; }
        #stars { width: 1px; height: 1px; background: transparent; box-shadow: 1744px 122px #FFF , 134px 1321px #FFF, 500px 600px #FFF; animation: animStar 50s linear infinite; }
        #stars2 { width: 2px; height: 2px; background: transparent; box-shadow: 444px 122px #FFF , 134px 521px #FFF, 800px 200px #FFF; animation: animStar 100s linear infinite; }
        @keyframes animStar { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 40px; text-align: center; width: 380px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .glitch { font-family: 'Orbitron'; color: var(--primary); letter-spacing: 5px; text-shadow: 0 0 10px var(--primary); animation: glitch-anim 2s infinite; }
        @keyframes glitch-anim { 0%, 100% { text-shadow: 2px 0 0 red, -2px 0 0 blue; } 50% { text-shadow: -2px 0 0 red, 2px 0 0 blue; } }
        input { width: 90%; padding: 12px; margin: 15px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); border-radius: 5px; color: #fff; outline: none; }
        .btn-launch { background: linear-gradient(45deg, var(--primary), var(--accent)); border: none; padding: 12px 30px; border-radius: 5px; color: #fff; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .btn-launch:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .gallery img { width: 100%; border-radius: 8px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div class="stars"></div>
    <div class="twinkling"></div>
    <div class="clouds"></div>
    <div class="meteors"></div>

    <section id="login-screen" class="glass-card">
        <h1 class="glitch">PROJECT TESSERACT</h1>
        <div style="font-size: 0.8em; letter-spacing: 2px; margin-bottom: 20px;">Data Transmission // Class of 2026</div>
        <input type="text" id="username" placeholder="Định danh (Vd: quynhtien)">
        <input type="password" id="password" placeholder="Mật mã không gian">
        <button onclick="checkAccess()" class="btn-launch">TRUY CẬP</button>
        <p id="error-msg" style="display: none; color: #ff4d4d; margin-top: 15px;">Tín hiệu bị nhiễu. Kiểm tra lại mật mã!</p>
    </section>

    <section id="private-content" style="display: none; text-align: center;">
        <div class="glass-card" style="width: 90%; max-width: 600px;">
            <h2 id="welcome-name" style="font-family: 'Orbitron'; color: var(--primary);"></h2>
            <p id="personal-wish" style="line-height: 1.6;"></p>
            <div id="photo-gallery" class="gallery"></div>
            <button onclick="location.reload()" class="btn-launch" style="margin-top: 20px;">QUAY LẠI</button>
        </div>
    </section>

    <script>
        // JAVASCRIPT GỘP TRỰC TIẾP VÀO ĐÂY
        const database = {
            "quynhtien": {
                pass: "2008",
                name: "Quỳnh Tiên",
                wish: "Chào Tiên, chúc cậu 8/3 rực rỡ và luôn là vì sao sáng nhất lớp mình nhé! ✨",
                images: ["img/tien1.jpg", "img/tien2.jpg"]
            },
            "hoangyen": {
                pass: "832026",
                name: "Hoàng Yến",
                wish: "Gửi Yến, chúc cậu luôn xinh đẹp và hạnh phúc! 🌸",
                images: ["img/yen1.jpg"]
            }
        };

        function checkAccess() {
            const user = document.getElementById('username').value.toLowerCase().trim();
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            if (database[user] && database[user].pass === pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('private-content').style.display = 'flex';
                document.getElementById('private-content').style.flexDirection = 'column';
                document.getElementById('private-content').style.alignItems = 'center';
                document.getElementById('welcome-name').innerText = "Hệ thống nhận diện: " + database[user].name;
                document.getElementById('personal-wish').innerText = database[user].wish;
                
                const gallery = document.getElementById('photo-gallery');
                gallery.innerHTML = "";
                database[user].images.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    gallery.appendChild(img);
                });
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
